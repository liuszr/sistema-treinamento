<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Treinamentos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      color: #e0e0e0;
      margin-bottom: 40px;
      font-size: 28px;
      text-align: center;
    }

    .menu {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .menu button {
      padding: 16px 40px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #16213e;
      color: #e0e0e0;
      border: 2px solid #0f3460;
      transition: all 0.2s;
    }

    .menu button:hover, .menu button.ativo {
      background-color: #0f3460;
      color: white;
      border-color: #e94560;
    }

    .tela {
      display: none;
      width: 100%;
      max-width: 700px;
    }

    .tela.ativa { display: block; }

    .card {
      background: #16213e;
      padding: 24px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid #0f3460;
    }

    .card h2 {
      color: #e0e0e0;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .subtabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .subtabs button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #0f3460;
      color: #aaa;
      font-size: 14px;
      transition: all 0.2s;
    }

    .subtabs button.ativo {
      background-color: #063b04;
      color: white;
      font-weight: bold;
    }

    .subform { display: none; }
    .subform.ativo { display: block; }

    label {
      color: #aaa;
      font-size: 14px;
      display: block;
      margin-bottom: 4px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-size: 14px;
    }

    input::placeholder { color: #555; }

    button.btn-salvar {
      background-color: #023807;
      color: white;
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.2s;
    }

    button.btn-salvar:hover { background-color: #023807; }

    .busca-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .busca-row input { margin-bottom: 0; }

    .busca-row button {
      padding: 10px 20px;
      background-color: #023807;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      white-space: nowrap;
    }

    .resultado {
      color: #e0e0e0;
    }

    .resultado h3 {
      margin-bottom: 12px;
      background-color: #023807;
    }

    .treinamento-item {
      background: #0f3460;
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .treinamento-item span { color: #e0e0e0; }

    .treinamento-item button {
      background-color: #023807;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .vazio {
      color: #555;
      font-style: italic;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <h1>Sistema de Gestão de Treinamentos</h1>

  <div class="menu">
    <button onclick="mostrarTela('cadastro')" id="btnCadastro">📋 CADASTRO</button>
    <button onclick="mostrarTela('consulta')" id="btnConsulta">🔍 CONSULTA</button>
  </div>

  <!-- TELA CADASTRO -->
  <div class="tela" id="telaCadastro">
    <div class="card">
      <div class="subtabs">
        <button onclick="mostrarSubform('formFuncionario')" id="subFuncionario" class="ativo">Cadastrar Funcionário</button>
        <button onclick="mostrarSubform('formTreinamento')" id="subTreinamento">Vincular Treinamento</button>
      </div>

      <!-- Subform Funcionário -->
      <div class="subform ativo" id="formFuncionario">
        <label>Nome completo:</label>
        <input type="text" id="nomeFuncionario" placeholder="Ex: Maria Silva">
        <label>ID:</label>
        <input type="text" id="idFuncionario" placeholder="Ex: 001">
        <button class="btn-salvar" onclick="cadastrarFuncionario()">Salvar Funcionário</button>
      </div>

      <!-- Subform Treinamento -->
      <div class="subform" id="formTreinamento">
        <label>Buscar funcionário (nome ou ID):</label>
        <input type="text" id="buscaFuncionarioTreinamento" placeholder="Digite nome ou ID..." oninput="filtrarFuncionarios()">
        <select id="selectFuncionario" size="4" style="margin-bottom:16px; height: auto;"></select>
        <label>Setor (opcional):</label>
        <input type="text" id="setor" placeholder="Ex: Elétrica">
        <label>Nome do treinamento:</label>
        <input type="text" id="nomeTreinamento" placeholder="Ex: NR10">
        <label>Comprovante (PDF ou imagem):</label>
        <input type="file" id="arquivoTreinamento" accept=".pdf, image/*">
        <button class="btn-salvar" onclick="cadastrarTreinamento()">Salvar Treinamento</button>
      </div>
    </div>
  </div>

  <!-- TELA CONSULTA -->
  <div class="tela" id="telaConsulta">
    <div class="card">
      <h2>Consultar Funcionário</h2>
      <div class="busca-row">
        <input type="text" id="campoBusca" placeholder="Digite nome ou ID do funcionário...">
        <button onclick="consultar()">Buscar</button>
      </div>
      <div class="resultado" id="resultadoConsulta"></div>
    </div>
  </div>

  <script>
    function mostrarTela(tela) {
      document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
      document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
      document.getElementById('tela' + tela.charAt(0).toUpperCase() + tela.slice(1)).classList.add('ativa');
      document.getElementById('btn' + tela.charAt(0).toUpperCase() + tela.slice(1)).classList.add('ativo');
    }

    function mostrarSubform(id) {
      document.querySelectorAll('.subform').forEach(f => f.classList.remove('ativo'));
      document.querySelectorAll('.subtabs button').forEach(b => b.classList.remove('ativo'));
      document.getElementById(id).classList.add('ativo');
      if (id === 'formTreinamento') {
        filtrarFuncionarios();
        document.getElementById('subTreinamento').classList.add('ativo');
      } else {
        document.getElementById('subFuncionario').classList.add('ativo');
      }
    }

    function cadastrarFuncionario() {
      const nome = document.getElementById('nomeFuncionario').value.trim();
      const id = document.getElementById('idFuncionario').value.trim();

      if (!nome || !id) { alert('Preencha todos os campos!'); return; }

      const funcionarios = JSON.parse(localStorage.getItem('funcionarios') || '[]');

      if (funcionarios.find(f => f.id === id)) {
        alert('Já existe um funcionário com esse ID!'); return;
      }

      funcionarios.push({ id, nome });
      localStorage.setItem('funcionarios', JSON.stringify(funcionarios));
      alert(`Funcionário ${nome} cadastrado com sucesso!`);

      document.getElementById('nomeFuncionario').value = '';
      document.getElementById('idFuncionario').value = '';
    }

    function filtrarFuncionarios() {
      const busca = document.getElementById('buscaFuncionarioTreinamento').value.toLowerCase();
      const funcionarios = JSON.parse(localStorage.getItem('funcionarios') || '[]');
      const select = document.getElementById('selectFuncionario');

      const filtrados = funcionarios.filter(f =>
        f.nome.toLowerCase().includes(busca) || f.id.includes(busca)
      );

      select.innerHTML = filtrados.length === 0
        ? '<option value="">Nenhum funcionário encontrado</option>'
        : filtrados.map(f => `<option value="${f.id}">${f.nome} (ID: ${f.id})</option>`).join('');
    }

    function cadastrarTreinamento() {
      const funcionarioId = document.getElementById('selectFuncionario').value;
      const setor = document.getElementById('setor').value.trim();
      const nomeTreinamento = document.getElementById('nomeTreinamento').value.trim();
      const arquivo = document.getElementById('arquivoTreinamento').files[0];

      if (!funcionarioId || !nomeTreinamento || !arquivo) {
        alert('Selecione o funcionário, informe o treinamento e o comprovante!'); return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const treinamentos = JSON.parse(localStorage.getItem('treinamentos') || '[]');
        treinamentos.push({
          funcionarioId, setor, nomeTreinamento,
          arquivo: e.target.result,
          nomeArquivo: arquivo.name
        });
        localStorage.setItem('treinamentos', JSON.stringify(treinamentos));
        alert(`Treinamento ${nomeTreinamento} salvo com sucesso!`);

        document.getElementById('setor').value = '';
        document.getElementById('nomeTreinamento').value = '';
        document.getElementById('arquivoTreinamento').value = '';
      };
      reader.readAsDataURL(arquivo);
    }

    function consultar() {
      const busca = document.getElementById('campoBusca').value.toLowerCase().trim();
      if (!busca) { alert('Digite um nome ou ID para buscar!'); return; }

      const funcionarios = JSON.parse(localStorage.getItem('funcionarios') || '[]');
      const treinamentos = JSON.parse(localStorage.getItem('treinamentos') || '[]');
      const resultado = document.getElementById('resultadoConsulta');

      const funcionario = funcionarios.find(f =>
        f.nome.toLowerCase().includes(busca) || f.id.includes(busca)
      );

      if (!funcionario) {
        resultado.innerHTML = '<p class="vazio">Funcionário não encontrado.</p>';
        return;
      }

      const treinadosDele = treinamentos.filter(t => t.funcionarioId === funcionario.id);

      let html = `<h3>${funcionario.nome} — ID: ${funcionario.id}</h3>`;

      if (treinadosDele.length === 0) {
        html += '<p class="vazio">Nenhum treinamento cadastrado.</p>';
      } else {
        treinadosDele.forEach(t => {
          html += `
            <div class="treinamento-item">
              <span>📄 ${t.nomeTreinamento} ${t.setor ? '— ' + t.setor : ''}</span>
              <button onclick="abrirArquivo('${t.nomeArquivo}', this)" data-arquivo='${t.arquivo}'>Ver comprovante</button>
            </div>`;
        });
      }

      resultado.innerHTML = html;
    }

    function abrirArquivo(nome, btn) {
      const arquivo = btn.getAttribute('data-arquivo');
      const link = document.createElement('a');
      link.href = arquivo;
      link.download = nome;
      link.click();
    }

    mostrarTela('cadastro');
  </script>

</body>
</html>
